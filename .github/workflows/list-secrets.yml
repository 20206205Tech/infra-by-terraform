name: Update Secrets Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite README with Secrets
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          node -e "
            const fs = require('fs');
            const path = './README.md';
            
            // 1. Lấy danh sách keys từ GitHub Secrets và sắp xếp ABC
            const secrets = JSON.parse(process.env.SECRETS_JSON || '{}');
            const secretKeys = Object.keys(secrets)
              .filter(k => k.toLowerCase() !== 'github_token')
              .sort((a, b) => a.localeCompare(b)) // Sắp xếp theo thứ tự bảng chữ cái
              .map(k => '- \`' + k + '\`');
            
            // 2. Tạo nội dung mới (Ghi đè hoàn toàn)
            const title = '# Project Secret Keys\n\n';
            const description = 'Danh sách các biến môi trường cần thiết cho dự án:\n\n';
            const content = secretKeys.length > 0 
              ? secretKeys.join('\n') 
              : '*Không có secret nào được thiết lập.*';

            // 3. Ghi đè file (fs.writeFileSync sẽ xoá nội dung cũ)
            fs.writeFileSync(path, title + description + content + '\n');
            console.log('Đã ghi đè README.md thành công!');
          "

      - name: Commit and Push
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: overwrite secrets list [skip ci]" || echo "No changes to commit"
          git push
